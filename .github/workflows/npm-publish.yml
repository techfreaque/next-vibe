name: Release to npm + Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  create:
    tags:
      - "*"

jobs:
  # Run checks on PRs and non-tag pushes
  check:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup environment
        run: cp .env.example .env

      - name: Install dependencies
        run: bun install

      - name: Run checks (lint, typecheck, tests)
        run: bun src/app/api/[locale]/system/unified-interface/cli/vibe-runtime.ts check

      - name: Build package (dry run)
        run: bun src/app/api/[locale]/system/unified-interface/cli/vibe-runtime.ts build --run-prod-database=false

  # Publish to npm + deploy to VPS on tag creation
  # Triggered by: vibe pub (locally) → creates tag → pushes → this runs
  publish-and-deploy:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js (for npm publish with provenance)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup environment
        run: cp .env.example .env

      - name: Install dependencies
        run: bun install

      # Release tool in CI mode: checks, builds, publishes to npm,
      # then postPublish hook SSHs into VPS and deploys via install-docker.sh
      - name: Release + Deploy
        run: bun src/app/api/[locale]/system/unified-interface/cli/vibe-runtime.ts release --ci --skip-git-tag --skip-git-push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Deploy: passed to postPublish hook in release.config.ts
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
