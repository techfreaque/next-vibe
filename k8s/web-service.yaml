apiVersion: v1
kind: Service
metadata:
  name: next-vibe-web
  namespace: next-vibe
  labels:
    app.kubernetes.io/name: next-vibe
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: next-vibe
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: websocket
      port: 4000
      targetPort: 4000
      protocol: TCP
