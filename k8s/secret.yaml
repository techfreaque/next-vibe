# Secret environment variables
# IMPORTANT: Replace placeholder values before applying!
# Consider using sealed-secrets or external-secrets-operator in production.
apiVersion: v1
kind: Secret
metadata:
  name: next-vibe-secret
  namespace: next-vibe
type: Opaque
stringData:
  DATABASE_URL: "postgres://user:password@postgres-host:5432/next_vibe"
  JWT_SECRET_KEY: "change-me-to-a-random-string-at-least-32-chars"
  CRON_SECRET: "change-me-to-a-random-string-at-least-32-chars"
  VIBE_ADMIN_USER_EMAIL: "admin@example.com"
  VIBE_ADMIN_USER_PASSWORD: "change-me-strong-password"
  # Only needed when WS_PUBSUB_TYPE=redis
  # REDIS_URL: "redis://redis:6379"
  # S3 storage (when CHAT_STORAGE_TYPE=s3)
  # S3_ENDPOINT: "https://s3.amazonaws.com"
  # S3_REGION: "us-east-1"
  # S3_BUCKET: "your-bucket"
  # S3_ACCESS_KEY_ID: ""
  # S3_SECRET_ACCESS_KEY: ""
  # AI provider keys
  # OPENROUTER_API_KEY: ""
