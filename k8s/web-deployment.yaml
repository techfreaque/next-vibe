# Web Deployment: Next.js + WebSocket sidecar
# Scale replicas as needed. For >1 replica, set WS_PUBSUB_TYPE=redis.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-vibe-web
  namespace: next-vibe
  labels:
    app.kubernetes.io/name: next-vibe
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: next-vibe
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: next-vibe
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: next-vibe:latest
          command:
            - bun
            - src/app/api/[locale]/system/unified-interface/cli/vibe-runtime.ts
            - start
            - --mode=web
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: websocket
              containerPort: 4000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: next-vibe-config
            - secretRef:
                name: next-vibe-secret
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
